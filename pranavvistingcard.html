<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Avanzo Business Card</title>
  <link href="https://fonts.googleapis.com/css2?family=EB+Garamond:ital,wght@0,400;0,600;1,400&family=Montserrat:wght@300;400;500;600;700&display=swap" rel="stylesheet"/>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: #ffffff;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      font-family: 'Montserrat', sans-serif;
      gap: 40px;
      padding: 40px 20px;
    }

    h2 {
      font-family: 'Montserrat', sans-serif;
      font-weight: 500;
      color: #555;
      font-size: 13px;
      letter-spacing: 2px;
      text-transform: uppercase;
    }

    .card-wrapper {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 12px;
    }

    .card-label {
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 3px;
      text-transform: uppercase;
      color: #888;
    }

    /* CARD BASE */
    .card {
      width: 900px;
      height: 500px;
      border-radius: 6px;
      box-shadow: 0 8px 40px rgba(0,0,0,0.13);
      position: relative;
      overflow: hidden;
    }

    /* ── FRONT ── */
    .card-front {
      background: #F7F7F7;
      display: flex;
      flex-direction: column;
    }

    /* Top section – name & title */
    .front-top {
      display: flex;
      flex-direction: column;
      align-items: end;
      padding: 52px 60px 0;
      gap: 10px;
      margin-bottom: -20px;
    }

    .front-name {
      font-family: 'Montserrat', sans-serif;
      font-weight: 700;
      font-size: 32px;
      letter-spacing: 3px;
      color: #7a6030;
      text-transform: uppercase;
    }

    .front-title {
      font-family: 'Montserrat', sans-serif;
      font-weight: 500;
      font-size: 28px;
      letter-spacing: 5.7px;
      color: #555;
      text-transform: uppercase;
    }

    /* Bottom section – logo left | vertical line | contact right */
    .front-bottom {
      display: flex;
      flex: 1;

      padding: 100px 80px;
      gap: 0;
    }

    /* Logo block */
    .front-logo {
      display: flex;
      flex-direction: column;
      

      flex: 0 0 340px;
      padding-right: 48px;
    }

    .front-logo img {
      max-width: 250px;
      height: auto;
    }

    /* Logo placeholder when src is empty */
    .front-logo img[src=""] {
      display: block;
      width: 200px;
      height: 70px;
      background: transparent;
    }

    /* Vertical separator */
    .front-sep {
      width: 1.5px;
      height: 230px;
      background: #bbb;
      flex-shrink: 0;
    }

    /* Contact block */
    .front-contact {
      flex: 1;
      padding-left: 40px;
      display: flex;
      flex-direction: column;
      gap: 18px;
    }

    .contact-group {
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    .contact-line {
      font-family: 'Montserrat', sans-serif;
      font-weight: 450;
      font-size: 21px;
      /* letter-spacing: 1px; */
      color: #333;
      text-transform: uppercase;
      line-height: 1.4;
    }
    .email-line{
      font-family: 'Montserrat', sans-serif;
          font-weight: 450;
          font-size: 23px;
          letter-spacing: 1px;
          color: #333;
          line-height: 1.4;
          padding-right: 2px;
    }


    /* ── BACK ── */
   .card-back {
    background: #F7F7F7;
    display: flex;
    flex-direction: column;
    justify-content: flex-end;
    align-items: flex-start;
    padding: 80px;
}

.card-back img {
    width: 35%;
    object-fit: contain;
    padding-bottom: 15px;
}
    /* ── BUTTONS ── */
    .btn-row {
      display: flex;
      gap: 14px;
      margin-top: 6px;
    }

    .btn {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 11px 24px;
      border-radius: 4px;
      font-family: 'Montserrat', sans-serif;
      font-size: 12px;
      font-weight: 600;
      letter-spacing: 1.5px;
      text-transform: uppercase;
      cursor: pointer;
      border: none;
      text-decoration: none;
      transition: opacity .18s, transform .12s;
    }

    .btn:hover { opacity: .85; transform: translateY(-1px); }
    .btn:active { transform: translateY(0); }

    .btn-front {
      background: #7a6030;
      color: #fff;
    }

    .btn-back {
      background: #7a6030;
      color: #fff;
    }

    .btn svg {
      width: 14px;
      height: 14px;
      fill: currentColor;
    }
  </style>
</head>
