<!DOCTYPE html>
<html lang="en">

<head>
  <!-- Google tag (gtag.js) -->
  <script async src="https://www.googletagmanager.com/gtag/js?id=G-HZ5H2HXZ72"></script>
  <script> window.dataLayer = window.dataLayer || []; function gtag() { dataLayer.push(arguments); } gtag('js', new Date()); gtag('config', 'G-HZ5H2HXZ72'); </script>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>1-Min Health Check | AVANZO TRUST</title>
  <link rel="stylesheet" href="css/style.css">
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="icon" type="image/png" href="images/avanzo_trust_logo.png">
</head>

<body class="bg-[#f7f3ef] min-h-screen flex flex-col">

  <!-- Header -->
  <div id="header-container"></div>
  <script src="js/header.js"></script>

  <main class="flex-grow flex items-center justify-center py-24 px-4 mt-16">
    <div class="max-w-3xl w-full bg-white rounded-3xl shadow-2xl border border-[#e5d6c3] p-6 md:p-10 relative overflow-hidden" id="quiz-container">
      
      <!-- Progress Bar -->
      <div class="mb-8" id="progress-container">
        <div class="flex justify-between text-sm font-medium text-[#7a5a3a] mb-2">
          <span>Question <span id="current-q-num">1</span> of 20</span>
          <span id="progress-percent">5%</span>
        </div>
        <div class="w-full bg-[#f3ede7] rounded-full h-2.5">
          <div id="progress-bar" class="bg-[#5c4033] h-2.5 rounded-full transition-all duration-300" style="width: 5%"></div>
        </div>
      </div>

      <!-- Question View -->
      <div id="question-view">
        <h2 id="question-text" class="text-2xl md:text-3xl font-bold text-[#3b1f0e] mb-8 leading-tight">
          Loading question...
        </h2>

        <div class="space-y-4" id="options-container">
          <!-- Options will be injected here via JS -->
        </div>
      </div>

      <!-- Results View -->
      <div id="results-view" class="hidden text-center">
        <div class="w-24 h-24 mx-auto rounded-full flex items-center justify-center mb-6" id="result-icon-bg">
          <svg id="result-icon" class="w-12 h-12 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>
        </div>
        <h2 class="text-4xl font-extrabold text-[#3b1f0e] mb-2" id="score-text">0%</h2>
        <h3 class="text-2xl font-semibold text-[#5c4033] mb-4" id="result-title">Calculating...</h3>
        <p class="text-[#7a5a3a] text-lg mb-8 leading-relaxed" id="result-desc">Please wait while we calculate your cyber health score.</p>
        
        <div class="bg-[#fdf8f3] rounded-2xl p-6 border border-[#e5d6c3] text-left mb-8">
          <h4 class="font-bold text-[#3b1f0e] mb-4">Key Recommendations:</h4>
          <ul class="space-y-3 text-[#6b5040] text-sm md:text-base" id="recommendations-list">
            <!-- Recommendations injected here -->
          </ul>
        </div>

        <button onclick="location.reload()" class="bg-[#5c4033] text-white font-bold py-3 px-8 rounded-full hover:bg-[#482f21] transition-colors shadow-lg hover:shadow-xl w-full sm:w-auto">
          TAKE ASSESSMENT AGAIN
        </button>
      </div>

    </div>
  </main>

  <div id="footer-container"></div>
  <script src="js/footer.js"></script>

  <script>
    const questions = [
      { text: "1. Do you use a different password for important accounts such as email, banking, and social media?", inverted: false },
      { text: "2. Have you enabled two-factor authentication (2FA) on your important accounts?", inverted: false },
      { text: "3. Before clicking a link received through SMS, WhatsApp, email, or social media, do you verify the sender and destination?", inverted: false },
      { text: "4. Do you regularly update your phone, computer, and applications when updates are available?", inverted: false },
      { text: "5. Have you ever shared an OTP, PIN, password, or banking credential with another person?", inverted: true },
      { text: "6. Do you review and manage the privacy settings of your social media accounts?", inverted: false },
      { text: "7. Do you avoid accessing banking or sensitive accounts while connected to public Wi-Fi networks?", inverted: false },
      { text: "8. Can you identify common signs of phishing emails, fake websites, or online scams?", inverted: false },
      { text: "9. Do you use a screen lock (PIN, password, fingerprint, or face recognition) on your devices?", inverted: false },
      { text: "10. Do you regularly back up important photos, documents, and files?", inverted: false },
      { text: "11. Do you install apps only from trusted sources such as official app stores?", inverted: false },
      { text: "12. Before making online purchases, do you verify the authenticity of the website or seller?", inverted: false },
      { text: "13. Do you know where and how to report a cybercrime or online fraud if it happens to you?", inverted: false },
      { text: "14. Do you avoid sharing personal information such as Aadhaar number, bank details, or passwords through calls, messages, or social media?", inverted: false },
      { text: "15. Are you aware that AI-generated voice calls, videos, and messages can be used for fraud and impersonation scams?", inverted: false },
      { text: "16. Do you check website URLs carefully before entering passwords or payment information?", inverted: false },
      { text: "17. Have you attended any cyber security awareness program in the last 12 months?", inverted: false },
      { text: "18. Do you use antivirus or security software on your computer or mobile device?", inverted: false },
      { text: "19. Can you recognize fake job offers, investment schemes, or lottery scams online?", inverted: false },
      { text: "20. Do you discuss cyber safety practices with your family, friends, or colleagues?", inverted: false }
    ];

    let currentIndex = 0;
    let score = 0;
    const maxScore = questions.length * 3;

    const questionText = document.getElementById('question-text');
    const optionsContainer = document.getElementById('options-container');
    const currentQNum = document.getElementById('current-q-num');
    const progressBar = document.getElementById('progress-bar');
    const progressPercent = document.getElementById('progress-percent');
    
    const questionView = document.getElementById('question-view');
    const resultsView = document.getElementById('results-view');
    const progressContainer = document.getElementById('progress-container');

    function renderQuestion() {
      const q = questions[currentIndex];
      questionText.textContent = q.text;
      
      currentQNum.textContent = currentIndex + 1;
      const pct = Math.round(((currentIndex + 1) / questions.length) * 100);
      progressPercent.textContent = pct + "%";
      progressBar.style.width = pct + "%";

      optionsContainer.innerHTML = '';
      
      const options = [
        { label: "Always", value: q.inverted ? 0 : 3 },
        { label: "Sometimes", value: q.inverted ? 1 : 2 },
        { label: "Rarely", value: q.inverted ? 2 : 1 },
        { label: "Never", value: q.inverted ? 3 : 0 }
      ];

      options.forEach(opt => {
        const btn = document.createElement('button');
        btn.className = "w-full text-left bg-[#fdf8f3] hover:bg-[#f0e4d4] border border-[#e5d6c3] rounded-xl p-4 md:p-5 text-[#5c4033] font-medium text-lg transition-colors flex items-center group shadow-sm";
        btn.innerHTML = `
          <div class="w-6 h-6 rounded-full border-2 border-[#d6c4b0] mr-4 flex items-center justify-center group-hover:border-[#5c4033] transition-colors">
            <div class="w-3 h-3 bg-transparent rounded-full group-hover:bg-[#5c4033]/20 transition-colors"></div>
          </div>
          ${opt.label}
        `;
        btn.onclick = () => handleAnswer(opt.value);
        optionsContainer.appendChild(btn);
      });
    }

    function handleAnswer(value) {
      score += value;
      currentIndex++;

      if (currentIndex < questions.length) {
        renderQuestion();
      } else {
        showResults();
      }
    }

    function showResults() {
      questionView.classList.add('hidden');
      progressContainer.classList.add('hidden');
      resultsView.classList.remove('hidden');

      const finalPercent = Math.round((score / maxScore) * 100);
      document.getElementById('score-text').textContent = finalPercent + "%";

      const titleEl = document.getElementById('result-title');
      const descEl = document.getElementById('result-desc');
      const bgEl = document.getElementById('result-icon-bg');
      const listEl = document.getElementById('recommendations-list');

      let recs = [];

      if (finalPercent >= 85) {
        titleEl.textContent = "Excellent Security Posture!";
        descEl.textContent = "Great job! You have very strong cyber security habits. Keep up the vigilance and continue staying informed about new threats.";
        bgEl.className = "w-24 h-24 mx-auto rounded-full flex items-center justify-center mb-6 bg-green-500 shadow-lg shadow-green-500/30";
        recs = [
          "Continue updating your devices promptly.",
          "Consider using a password manager for even stronger unique passwords.",
          "Help educate your friends and family on best practices."
        ];
      } else if (finalPercent >= 60) {
        titleEl.textContent = "Good, but Needs Tweaking";
        descEl.textContent = "You are aware of many threats, but there are some gaps in your cyber hygiene. A few adjustments will make you much safer.";
        bgEl.className = "w-24 h-24 mx-auto rounded-full flex items-center justify-center mb-6 bg-yellow-500 shadow-lg shadow-yellow-500/30";
        recs = [
          "Ensure Two-Factor Authentication (2FA) is turned on for ALL important accounts.",
          "Be more cautious when connecting to public Wi-Fi networks.",
          "Double-check URLs before entering any sensitive information."
        ];
      } else {
        titleEl.textContent = "High Risk - Action Required";
        descEl.textContent = "Your current online habits put you at a significant risk for cyber attacks, identity theft, and financial fraud. Please take immediate steps to secure your digital life.";
        bgEl.className = "w-24 h-24 mx-auto rounded-full flex items-center justify-center mb-6 bg-red-500 shadow-lg shadow-red-500/30";
        recs = [
          "Stop using the same password across multiple sites immediately.",
          "Never share your OTP, PIN, or banking passwords with anyone.",
          "Enable screen locks and 2FA right now to prevent unauthorized access.",
          "Start verifying senders and links before clicking them."
        ];
      }

      listEl.innerHTML = recs.map(r => `<li class="flex items-start"><svg class="w-5 h-5 text-[#5c4033] mr-2 mt-0.5 flex-shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>${r}</li>`).join('');
    }

    renderQuestion();
  </script>
</body>
</html>
