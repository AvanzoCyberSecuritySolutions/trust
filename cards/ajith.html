<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Ajith Kumar Parakkad - Avanzo Charitable Trust</title>
  <link href="https://fonts.googleapis.com/css2?family=EB+Garamond:ital,wght@0,400;0,500;0,600;1,400&family=Montserrat:wght@300;400;500;600;700&display=swap" rel="stylesheet"/>
  <style>
    :root {
      --bg-color: #F9F6F0;
      --text-main: #2C251F;
      --text-muted: #5C5248;
      --accent-gold: #B89947;
      --card-bg: #FFFFFF;
      --font-serif: 'EB Garamond', serif;
      --font-sans: 'Montserrat', sans-serif;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      background-color: var(--bg-color);
      color: var(--text-main);
      font-family: var(--font-sans);
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      padding: 20px;
      -webkit-font-smoothing: antialiased;
    }

    /* Scene and Perspective */
    .scene {
      width: 100%;
      max-width: 380px;
      height: 600px;
      perspective: 1500px;
    }

    /* Card Container */
    .card {
      width: 100%;
      height: 100%;
      position: relative;
      transition: transform 0.8s cubic-bezier(0.4, 0.0, 0.2, 1);
      transform-style: preserve-3d;
      cursor: pointer;
    }

    .card.is-flipped {
      transform: rotateY(180deg);
    }

    /* Card Faces */
    .card__face {
      position: absolute;
      width: 100%;
      height: 100%;
      backface-visibility: hidden;
      border-radius: 12px;
      background-color: var(--card-bg);
      box-shadow: 0 20px 40px rgba(44, 37, 31, 0.08);
      overflow: hidden;
      display: flex;
      flex-direction: column;
    }

    .card__face--back {
      transform: rotateY(180deg);
      padding: 40px 30px;
      justify-content: center;
    }

    /* --- FRONT FACE --- */
    .profile-img-container {
      width: 100%;
      height: 60%;
      overflow: hidden;
      position: relative;
    }
    
    .profile-img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      object-position: top center;
    }

    .profile-img-container::after {
      content: '';
      position: absolute;
      bottom: 0;
      left: 0;
      width: 100%;
      height: 40%;
      background: linear-gradient(to top, rgba(255,255,255,1) 0%, rgba(255,255,255,0) 100%);
    }

    .profile-info {
      padding: 20px 30px 40px;
      text-align: center;
      flex-grow: 1;
      display: flex;
      flex-direction: column;
      justify-content: center;
    }

    .name {
      font-family: var(--font-serif);
      font-size: 28px;
      font-weight: 600;
      margin-bottom: 8px;
      color: var(--text-main);
      line-height: 1.2;
    }

    .title {
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: var(--accent-gold);
      margin-bottom: 24px;
    }

    @keyframes pulse-glow {
      0% { opacity: 0.6; transform: scale(1); }
      50% { opacity: 1; transform: scale(1.05); color: var(--accent-gold); }
      100% { opacity: 0.6; transform: scale(1); }
    }

    .tap-hint {
      font-size: 10px;
      letter-spacing: 1px;
      text-transform: uppercase;
      color: var(--text-muted);
      opacity: 0.6;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
      margin-top: auto;
      animation: pulse-glow 2s infinite ease-in-out;
    }

    .tap-hint svg {
      width: 12px;
      height: 12px;
      fill: currentColor;
    }

    /* --- BACK FACE --- */
    .back-header {
      text-align: center;
      margin-bottom: 40px;
    }

    .back-name {
      font-family: var(--font-serif);
      font-size: 24px;
      font-weight: 600;
      color: var(--text-main);
      margin-bottom: 4px;
    }

    .back-title {
      font-size: 10px;
      font-weight: 600;
      letter-spacing: 1.5px;
      text-transform: uppercase;
      color: var(--accent-gold);
    }

    .contact-list {
      list-style: none;
      display: flex;
      flex-direction: column;
      gap: 24px;
      margin-bottom: 40px;
    }

    .contact-item {
      display: flex;
      align-items: center;
      gap: 16px;
    }

    .contact-icon {
      width: 40px;
      height: 40px;
      border-radius: 50%;
      background-color: var(--bg-color);
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--accent-gold);
      flex-shrink: 0;
    }

    .contact-icon svg {
      width: 18px;
      height: 18px;
      stroke: currentColor;
      stroke-width: 2;
      fill: none;
    }

    .contact-info {
      display: flex;
      flex-direction: column;
    }

    .contact-label {
      font-size: 10px;
      text-transform: uppercase;
      letter-spacing: 1px;
      color: var(--text-muted);
      margin-bottom: 4px;
    }

    .contact-value {
      font-family: var(--font-serif);
      font-size: 18px;
      color: var(--text-main);
      text-decoration: none;
    }

    .contact-value:hover {
      color: var(--accent-gold);
    }

    .action-btn {
      display: block;
      width: 100%;
      padding: 16px;
      background-color: var(--text-main);
      color: #FFF;
      text-align: center;
      text-decoration: none;
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 2px;
      text-transform: uppercase;
      border-radius: 6px;
      transition: background-color 0.3s;
      border: 1px solid var(--text-main);
    }

    .action-btn:hover {
      background-color: transparent;
      color: var(--text-main);
    }

    /* Decorative element */
    .divider {
      width: 30px;
      height: 1px;
      background-color: var(--accent-gold);
      margin: 0 auto;
    }

  </style>
</head>
<body>

  <div class="scene">
    <div class="card" id="businessCard">
      
      <!-- FRONT FACE -->
      <div class="card__face card__face--front">
        <div class="profile-img-container">
          <!-- Direct image path from team.json -->
          <img src="/assets/images/officials/247da56a-0024-48ef-b574-28e8f5372476.webp" alt="Ajith Kumar Parakkad" class="profile-img">
        </div>
        <div class="profile-info">
          <div class="name">Ajith Kumar Parakkad</div>
          <div class="title">President Projects</div>
          
          <div class="divider"></div>
          
          <div class="tap-hint">
            <svg viewBox="0 0 24 24"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm5 11h-4v4h-2v-4H7v-2h4V7h2v4h4v2z"/></svg>
            Tap to view details
          </div>
        </div>
      </div>

      <!-- BACK FACE -->
      <div class="card__face card__face--back">
        <div class="back-header">
          <div class="back-name">Ajith Kumar Parakkad</div>
          <div class="back-title">President Projects</div>
        </div>
        
        <ul class="contact-list">
          <li class="contact-item">
            <div class="contact-icon">
              <svg viewBox="0 0 24 24" stroke-linecap="round" stroke-linejoin="round">
                <path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07 19.5 19.5 0 0 1-6-6 19.79 19.79 0 0 1-3.07-8.67A2 2 0 0 1 4.11 2h3a2 2 0 0 1 2 1.72 12.84 12.84 0 0 0 .7 2.81 2 2 0 0 1-.45 2.11L8.09 9.91a16 16 0 0 0 6 6l1.27-1.27a2 2 0 0 1 2.11-.45 12.84 12.84 0 0 0 2.81.7A2 2 0 0 1 22 16.92z"></path>
              </svg>
            </div>
            <div class="contact-info">
              <span class="contact-label">Phone</span>
              <a href="tel:+910000000000" class="contact-value" onclick="event.stopPropagation()">+91 000 000 0000</a>
            </div>
          </li>
          
          <li class="contact-item">
            <div class="contact-icon">
              <svg viewBox="0 0 24 24" stroke-linecap="round" stroke-linejoin="round">
                <path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"></path>
                <polyline points="22,6 12,13 2,6"></polyline>
              </svg>
            </div>
            <div class="contact-info">
              <span class="contact-label">Email</span>
              <a href="mailto:ajith@avanzo.org" class="contact-value" onclick="event.stopPropagation()">ajith@avanzo.org</a>
            </div>
          </li>
          
          <li class="contact-item">
            <div class="contact-icon">
              <svg viewBox="0 0 24 24" stroke-linecap="round" stroke-linejoin="round">
                <circle cx="12" cy="12" r="10"></circle>
                <line x1="2" y1="12" x2="22" y2="12"></line>
                <path d="M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z"></path>
              </svg>
            </div>
            <div class="contact-info">
              <span class="contact-label">Website</span>
              <a href="https://avanzo.org" target="_blank" class="contact-value" onclick="event.stopPropagation()">avanzo.org</a>
            </div>
          </li>
        </ul>

        <a href="#" class="action-btn" onclick="event.stopPropagation()">Save Contact</a>
      </div>
      
    </div>
  </div>

  <script>
    const card = document.getElementById('businessCard');
    card.addEventListener('click', function() {
      card.classList.toggle('is-flipped');
    });
  </script>
</body>
</html>
